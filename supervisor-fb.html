<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>SUPERVISOR FB</title><link rel="stylesheet" href="styles.css"></head><body><header><div class="wrap row space"><div><div class="top-title">SUPERVISOR FB</div><div id="welcome" class="small"></div></div><div class="row"><a href="board.html" class="ghost">บอร์ดรวม</a><button class="ghost" id="enablePushBtn">เปิดแจ้งเตือน</button><button class="ghost" id="logoutBtn">ออกจากระบบ</button></div></div></header><div class="wrap grid grid-2"><div class="panel"><div class="section-head"><h2 class="section-title">งานแผนก FB</h2><div id="firebaseStatus" class="firebase-inline"></div></div><form id="assignForm" class="grid"><div><label>เลือกงานจาก FO</label><select id="taskId"></select></div><div class="grid grid-2"><div><label>มอบหมายให้</label><select id="assignee"></select></div><div><label>Priority</label><select id="priority"><option>Medium</option><option>High</option><option>Urgent</option></select></div></div><div><label>คอมเมนต์ Supervisor</label><textarea id="svComment"></textarea></div><button class="good">Assign ภายในแผนก FB</button></form></div><div class="panel"><h2 class="section-title">รายการงาน</h2><div id="taskList"></div></div></div><script src="firebase-config.js"></script><script src="users-config.js"></script><script src="firebase-helpers.js"></script><script src="common.js"></script><script>const session=requireRole('supervisor_fb');welcome.textContent='ผู้ใช้งาน: '+session.name;logoutBtn.onclick=logout;enablePushBtn.onclick=()=>enableNotificationsForCurrentUser(session,'firebaseStatus');
async function render(dataOverride){const data=dataOverride||await getData();const tasks=(data.tasks||[]).filter(t=>t.targetDepartment==='FB');const users=(await getUsers()).filter(u=>u.role==='fb');assignee.innerHTML=users.map(u=>`<option value="${escapeHtml(u.name)}">${escapeHtml(u.name)}</option>`).join('');taskId.innerHTML=tasks.map(t=>`<option value="${t.id}">${escapeHtml(t.title)} (${escapeHtml(t.room||'-')}) • ${escapeHtml(t.status)}</option>`).join('');taskList.innerHTML=tasks.map(t=>`<article class="task"><h4>${escapeHtml(t.title)}</h4><div class="meta">${escapeHtml(taskLocationText(t))}</div><div class="meta">FO: ${escapeHtml(t.requestedBy||'-')} • คนทำงาน: ${escapeHtml(t.assignee||'-')} • สถานะ: ${escapeHtml(t.status)}</div><div class="badges">${statusBadge(t)}</div></article>`).join('')||'<div class="small">ยังไม่มีงาน</div>'}
assignForm.addEventListener('submit',async e=>{e.preventDefault();const tasks=await getTasks();const t=tasks.find(x=>x.id===taskId.value);if(!t)return;t.assignedBy=session.name;t.assignee=assignee.value;t.priority=priority.value;t.comments=t.comments||[];if(svComment.value.trim())t.comments.unshift({at:new Date().toISOString(),by:session.name,text:svComment.value.trim()});await updateTask(t);assignForm.reset();await render()})
;(async()=>{setFirebaseStatus('firebaseStatus','checking');const fb=await checkFirebaseConnection();if(fb.ok)setFirebaseStatus('firebaseStatus','connected',fb.detail);else setFirebaseStatus('firebaseStatus',fb.mode,fb.detail);await ensureUsers();await seedData();await render();if(isFirebaseReady()){const wait=setInterval(()=>{if(window.firebaseHelpers?.subscribe){clearInterval(wait);window.firebaseHelpers.subscribe(render)}},500)}})();</script></body></html>
